apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: gvisor
spec:
  amiFamily: AL2023
  amiSelectorTerms:
  - alias: al2023@latest
  role: KarpenterNodeRole-test-s4
  securityGroupSelectorTerms:
  - tags:
      karpenter.sh/discovery: test-s4
  subnetSelectorTerms:
  - tags:
      karpenter.sh/discovery: test-s4
  tags:
    intent: gvisor
  userData: |
    #!/bin/bash
    # Install gVisor (runsc) for Karpenter-provisioned Graviton nodes
    # On AL2023 + Karpenter, this script is embedded in MIME userData by Karpenter.
    # It executes via cloud-init AFTER nodeadm has finished.
    set -eux

    ARCH=$(uname -m)
    GVISOR_URL="https://storage.googleapis.com/gvisor/releases/release/latest/${ARCH}"
    cd /tmp
    curl -fsSL "${GVISOR_URL}/runsc" -o runsc
    curl -fsSL "${GVISOR_URL}/containerd-shim-runsc-v1" -o containerd-shim-runsc-v1
    chmod +x runsc containerd-shim-runsc-v1
    mv runsc /usr/local/bin/
    mv containerd-shim-runsc-v1 /usr/local/bin/

    # Wait for containerd to be running (nodeadm starts it)
    for i in $(seq 1 30); do
      systemctl is-active containerd && break
      sleep 1
    done

    # Patch containerd config to add runsc runtime
    if ! grep -q runsc /etc/containerd/config.toml; then
      printf '\n[plugins."io.containerd.cri.v1.runtime".containerd.runtimes.runsc]\nruntime_type = "io.containerd.runsc.v1"\n' >> /etc/containerd/config.toml
      systemctl restart containerd
      sleep 3
      systemctl restart kubelet
    fi
